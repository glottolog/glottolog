[hh_ethnologue_comment]
comment = E16/E17/E18/E19/E20/E21/E22/E23/E24/E25/E26/E27/E28/E29 includes Raklungu, spoken in the southwest of Atauro island, in a single language Atauran [adb] comprising the Rasua (Rahesuk), Raklungu (Klu’un Hahan Adabe), Hresuk (Resuk) and Dadu’a varieties. In this, the code [adb] is re-used from an entry that originally referred to a supposed Papuan language of Atauro island. However, Raklungu is not intelligible to Dadu'a and Hresuk, likely not to Rasua either (**hh:hvw:Bracks:Atauro**) and thus merits its own entry. See also: Adabe [adb].
